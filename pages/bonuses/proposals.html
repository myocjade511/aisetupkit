<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Proposal Templates — AISetupKit Bonus</title>
<meta name="robots" content="noindex">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0b0b14;color:#e2e8f0;line-height:1.6}
.container{max-width:900px;margin:0 auto;padding:2rem}
.logo-mark{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-icon{background:linear-gradient(135deg,#6366f1,#06b6d4);color:#fff;font-size:1.1rem;font-weight:900;width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-text{display:flex;flex-direction:column}
.logo-top{font-size:.9rem;font-weight:900;color:#fff}
.logo-bottom{font-size:.6rem;font-weight:600;color:#06b6d4;text-transform:uppercase}
nav{display:flex;align-items:center;gap:2rem;padding:1.5rem 2rem;max-width:900px;margin:0 auto;border-bottom:1px solid rgba(255,255,255,.06)}
nav a{color:#8892a4;text-decoration:none;font-size:.85rem}
h1{font-size:1.8rem;margin-bottom:.3rem}
.subtitle{color:#8892a4;margin-bottom:2rem}
.proposal-form{background:#14142a;border-radius:12px;padding:2rem;border:1px solid rgba(255,255,255,.06);margin-bottom:2rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
.form-group{display:flex;flex-direction:column}
label{font-size:.8rem;color:#8892a4;margin-bottom:.3rem;font-weight:600}
input,textarea,select{padding:.7rem;border-radius:8px;border:1px solid rgba(255,255,255,.12);background:#0b0b14;color:#fff;font-size:.9rem}
input:focus,textarea:focus,select:focus{outline:none;border-color:#6366f1}
textarea{resize:vertical;min-height:60px}
.action-btns{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:1rem}
.btn{padding:.7rem 1.5rem;border-radius:8px;border:none;font-weight:600;font-size:.85rem;cursor:pointer}
.btn-primary{background:linear-gradient(135deg,#6366f1,#06b6d4);color:#fff}
.btn-outline{background:transparent;border:1px solid #6366f1;color:#6366f1}
.btn-outline:hover{background:rgba(99,102,241,.1)}

/* Preview */
.preview{background:#fff;color:#1a1a2e;padding:2rem;border-radius:8px;max-width:700px;margin:2rem auto}
.preview h2{font-size:1.5rem;margin-bottom:.5rem;color:#1a1a2e}
.preview .preview-body{font-size:.9rem;line-height:1.6;color:#333}
.preview .preview-meta{color:#666;font-size:.8rem;margin-bottom:1rem}

@media print {
  nav,.proposal-form,.action-btns{display:none!important}
  body,html{background:#fff!important}
  .preview{box-shadow:none;padding:32px;margin:0}
}

@media(max-width:600px){.form-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<nav>
<a href="/" class="logo-mark">
<div class="logo-icon">AI</div>
<div class="logo-text"><span class="logo-top">AISetupKit</span><span class="logo-bottom">Launch your AI agency</span></div>
</a>
<a href="/members">Dashboard</a>
<a href="/bonuses">Bonuses</a>
</nav>
<div class="container">
<h1>📄 Proposal Builder</h1>
<p class="subtitle">Fill in the blanks. Get a professional proposal. Print or copy as text.</p>

<div class="proposal-form">
<div class="form-row">
<div class="form-group"><label>Client Name</label><input id="clientName" value="ABC Company" oninput="updatePreview()"></div>
<div class="form-group"><label>Your Name</label><input id="yourName" value="Your Name" oninput="updatePreview()"></div>
</div>
<div class="form-row">
<div class="form-group"><label>Service</label>
<select id="serviceType" onchange="updatePreview()">
<option>AI Chatbot Setup</option>
<option>AI Content Automation</option>
<option>AI Social Media Management</option>
<option>AI Process Automation</option>
<option>AI Voice Agent</option>
<option>Custom AI Solution</option>
</select></div>
<div class="form-group"><label>Price ($)</label><input type="number" id="price" value="997" oninput="updatePreview()"></div>
</div>
<div class="form-group"><label>What They Get (key deliverables)</label><textarea id="deliverables" oninput="updatePreview()">Custom AI chatbot built for their business
Knowledge base setup with FAQs and product info
Embed code for their website
Training session for their team
30 days of support and maintenance</textarea></div>
<div class="action-btns">
<button class="btn btn-primary" onclick="copyText()">📋 Copy as Text</button>
<button class="btn btn-outline" onclick="window.print()">🖨️ Print / Save PDF</button>
<button class="btn btn-outline" onclick="openEmail()">📧 Open in Email</button>
</div>
</div>

<div class="preview" id="preview">
<h2 id="previewTitle">Proposal: AI Chatbot Setup</h2>
<div class="preview-meta" id="previewMeta">Prepared for: ABC Company | Prepared by: Your Name</div>
<div class="preview-body" id="previewBody">...</div>
</div>
</div>

<script>
function updatePreview() {
  const client = document.getElementById('clientName').value || 'Client';
  const name = document.getElementById('yourName').value || 'Your Name';
  const service = document.getElementById('serviceType').value;
  const price = document.getElementById('price').value || '0';
  const deliverables = document.getElementById('deliverables').value.split('\n').filter(Boolean);

  document.getElementById('previewTitle').textContent = `Proposal: ${service}`;
  document.getElementById('previewMeta').textContent = `Prepared for: ${client} | Prepared by: ${name}`;

  let body = `PROJECT OVERVIEW\n\n`;
  body += `We propose to build and deploy a custom ${service.toLowerCase()} for ${client}. This solution will automate key workflows, reduce manual effort, and deliver measurable ROI within the first month.\n\n`;
  body += `SCOPE OF WORK\n\n`;
  deliverables.forEach(d => { body += `→ ${d}\n`; });
  body += `\nINVESTMENT\n\n`;
  body += `One-time setup fee: $${price}\n`;
  body += `Monthly maintenance: $${Math.round(price * 0.3)}/mo (optional)\n\n`;
  body += `TIMELINE\n\n`;
  body += `Week 1: Discovery + Requirements\n`;
  body += `Week 2: Build + Configuration\n`;
  body += `Week 3: Testing + Revisions\n`;
  body += `Week 4: Launch + Training\n\n`;
  body += `NEXT STEPS\n\n`;
  body += `1. Confirm this proposal by replying to this email.\n`;
  body += `2. I'll send over the payment link.\n`;
  body += `3. We schedule the 30-minute kickoff call.\n\n`;
  body += `Questions? Let me know. Happy to jump on a quick call.\n\n`;
  body += `Best,\n${name}`;

  document.getElementById('previewBody').textContent = body;
}

function copyText() {
  const text = document.getElementById('previewBody').textContent;
  const header = document.getElementById('previewTitle').textContent + '\n' + document.getElementById('previewMeta').textContent + '\n\n';
  navigator.clipboard.writeText(header + text);
  alert('Copied!');
}

function openEmail() {
  const client = document.getElementById('clientName').value || 'Client';
  const name = document.getElementById('yourName').value || 'Your Name';
  const service = document.getElementById('serviceType').value;
  const body = encodeURIComponent(`Hi ${client},\n\nPlease find attached the proposal for ${service}. Let me know if you have any questions.\n\nBest,\n${name}`);
  window.open(`mailto:?subject=Proposal: ${service} for ${client}&body=${body}`);
}

updatePreview();
</script>
</body>
</html>
