<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Client Acquisition Scripts — AISetupKit</title>
<meta name="robots" content="noindex">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0b0b14;color:#e2e8f0;line-height:1.6}
.container{max-width:900px;margin:0 auto;padding:2rem}
.logo-mark{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-icon{background:linear-gradient(135deg,#6366f1,#06b6d4);color:#fff;font-size:1.1rem;font-weight:900;width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-text{display:flex;flex-direction:column}
.logo-top{font-size:.9rem;font-weight:900;color:#fff}
.logo-bottom{font-size:.6rem;font-weight:600;color:#06b6d4;text-transform:uppercase}
nav{display:flex;align-items:center;gap:2rem;padding:1.5rem 2rem;max-width:900px;margin:0 auto;border-bottom:1px solid rgba(255,255,255,.06)}
nav a{color:#8892a4;text-decoration:none;font-size:.85rem}
h1{font-size:1.8rem;margin-bottom:.3rem}
.subtitle{color:#8892a4;margin-bottom:2rem}
.script-tabs{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.5rem}
.script-tab{padding:.5rem 1.2rem;border-radius:8px;background:#14142a;border:1px solid rgba(255,255,255,.06);color:#8892a4;cursor:pointer;font-size:.85rem}
.script-tab.active{background:#6366f1;color:#fff;border-color:#6366f1}
.script-card{display:none;background:#14142a;border-radius:12px;padding:2rem;border:1px solid rgba(255,255,255,.06)}
.script-card.active{display:block}
.script-card h2{font-size:1.2rem;margin-bottom:1rem;color:#06b6d4}
.script-card .script-body{background:#0b0b14;border-radius:8px;padding:1.5rem;font-family:monospace;font-size:.85rem;line-height:1.7;white-space:pre-wrap;color:#e2e8f0;border:1px solid rgba(255,255,255,.06)}
.copy-btn{display:inline-block;padding:.5rem 1rem;border-radius:6px;background:transparent;border:1px solid #6366f1;color:#6366f1;cursor:pointer;font-size:.8rem;margin-top:1rem}
.copy-btn:hover{background:rgba(99,102,241,.1)}
.toast{position:fixed;bottom:2rem;right:2rem;background:#4ade80;color:#0b0b14;padding:.8rem 1.5rem;border-radius:10px;font-weight:600;font-size:.9rem;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
@media(max-width:600px){.script-tabs{flex-direction:column}}
</style>
</head>
<body>
<nav>
<a href="/" class="logo-mark">
<div class="logo-icon">AI</div>
<div class="logo-text"><span class="logo-top">AISetupKit</span><span class="logo-bottom">Launch your AI agency</span></div>
</a>
<a href="/members">Dashboard</a>
<a href="/deliverables/templates">Service Menu</a>
</nav>
<div class="container">
<h1>📞 Client Acquisition Scripts</h1>
<p class="subtitle">Copy, paste, customize. These scripts turn conversations into clients.</p>
<div class="script-tabs" id="scriptTabs"></div>
<div id="scriptContent"></div>
</div>
<div class="toast" id="toast">Copied!</div>
<script>
const scripts = [
  {name:"Cold DM (Instagram)",body:`Hey {name}! I saw your business and noticed you're crushing it with {something they do well}.

Quick question — have you thought about using AI to automate your {specific task}?

I help businesses like yours set up AI systems that save 10-15 hours a week. No tech skills needed on your end.

Want to see a 2-minute example?`},
  {name:"Cold DM (LinkedIn)",body:`Hi {name},

I've been following your work at {company} and I love what you're doing with {specific thing}.

I specialize in building AI automation for businesses — things like chatbots that book appointments, automated content creation, and lead qualification systems.

We just helped {similar client} save 20 hours/week with a simple AI setup.

Would you be open to a 10-minute call to see if this makes sense for you?`},
  {name:"Cold Email",body:`Subject: Saving {company} 10+ hours/week with AI

Hi {name},

I noticed {company} is doing great work in {industry}. 

Most businesses I talk to are spending way too much time on repetitive tasks — email responses, content creation, data entry, customer service.

I build AI automation systems that handle all of that. My clients typically save 10-20 hours per week within the first month.

Here's what one setup looks like:
→ AI chatbot handles 80% of customer inquiries
→ Automated content creation for social + blog
→ Lead qualification on autopilot

Would you be open to a quick call this week to see if this could work for {company}?

Best,
{your name}`},
  {name:"Discovery Call Script",body:`📞 DISCOVERY CALL FRAMEWORK

1. OPEN (2 min)
"Thanks for hopping on. Let me understand your situation first — what's taking up most of your team's time right now?"

2. PAIN (5 min)
"What's the most repetitive task you or your team does every day?"
"How much time do you think that costs you per week?"
"What happens if that task doesn't get done?"

3. SOLUTION (3 min)  
"Here's what I'd build for you: [describe solution]. It would handle [specific task] automatically so you and your team can focus on [higher value work]."

4. PRICE (1 min)
"This typically runs [price]. Most clients see ROI within the first month."

5. CLOSE (3 min)
"Does that sound like something you want to move forward with?"
"Great — I'll send over the proposal by tomorrow."`},
  {name:"Objection Handler",body:`OBJECTION: "We don't have budget right now."
RESPONSE: "Totally understand. Most of my clients feel the same way until they realize this saves them 10+ hours a week. At minimum wage that's already $150/week in time savings. The system pays for itself in the first month."

OBJECTION: "I need to think about it."
RESPONSE: "Of course. What specific questions do you have? Happy to answer them right now so you have everything you need to decide."

OBJECTION: "We already have someone doing that."
RESPONSE: "Great — that means you understand the value. How much are you paying them? I can likely do it for less with better results using AI."

OBJECTION: "I'm not technical."
RESPONSE: "That's perfect — you don't need to be. I handle all the setup and training. You just tell me what you need done."`},
  {name:"Closing Script",body:`📝 CLOSING SEQUENCE

STEP 1 — Recap Value
"Here's what we discussed: [recap problem and solution]. I'll set up [specific deliverable] which will save you [X hours or dollars per month]."

STEP 2 — Present Options
"Option A: Basic setup — $[price], done in 3 days.
Option B: Full setup with training — $[price], done in 5 days."

STEP 3 — Ask for the Yes
"Which option works better for you?"

STEP 4 — Payment + Onboarding
"Great choice. I'll send over the payment link now. Once that's confirmed, we'll start with a 15-minute kickoff call to gather what I need."

STEP 5 — Confirm Next Steps
"Here's what you can expect: Day 1 — kickoff call. Day 2-3 — build phase. Day 4 — review and revisions. Day 5 — launch and training."`}
];

const tabsEl = document.getElementById('scriptTabs');
const contentEl = document.getElementById('scriptContent');

scripts.forEach((s, i) => {
  const tab = document.createElement('div');
  tab.className = 'script-tab' + (i === 0 ? ' active' : '');
  tab.textContent = s.name;
  tab.dataset.index = i;
  tab.onclick = () => showScript(i);
  tabsEl.appendChild(tab);
});

function showScript(idx) {
  document.querySelectorAll('.script-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.script-tab')[idx].classList.add('active');
  const s = scripts[idx];
  contentEl.innerHTML = `
    <div class="script-card active">
      <h2>${s.name}</h2>
      <div class="script-body">${escapeHtml(s.body)}</div>
      <button class="copy-btn" onclick='copyScript(${idx})'>📋 Copy Script</button>
    </div>`;
}

function escapeHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

function copyScript(idx) {
  navigator.clipboard.writeText(scripts[idx].body).then(() => {
    const t = document.getElementById('toast'); t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000);
  });
}

showScript(0);
</script>
</body>
</html>
